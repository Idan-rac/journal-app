server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the static frontend files.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend container.
    # "backend" is the service name from docker-compose; in Kubernetes this
    # becomes the backend Service name (handled in the Kubernetes layer).
    location /api/ {
        proxy_pass http://backend:8000/api/;
    }

    location = /healthz {
        proxy_pass http://backend:8000/healthz;
    }
}
