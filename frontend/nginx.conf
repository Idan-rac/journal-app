server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the static frontend files.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward API calls to the backend container.
    location /api/ {
        proxy_pass http://todo-app-backend-service:8080/api/;
    }

    location = /healthz {
        proxy_pass http://todo-app-backend-service:8080/healthz;
    }
}