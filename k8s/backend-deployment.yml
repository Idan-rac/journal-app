apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-backend-deployment
  namespace: todo-app
  labels: 
    app: todo-app
    component: backend
spec:
  replicas: 1
  selector: #search for pods with the same labels
    matchLabels:
      app: todo-app
      component: backend
  template:
    metadata:
      labels: #the labels that we want to attach to the pods
        app: todo-app
        component: backend
    spec:
      containers:
        - name: todo-app-backend
          image: idanrachmany/todo-backend:latest
          imagePullPolicy: Always
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_DB
              value: todoapp
            - name: POSTGRES_USER
              value: todouser
            - name: POSTGRES_PASSWORD
              value: todopassword
            - name: DATABASE_URL #this is the environment variable that the backend application will use to connect to the database
              value: postgresql://todouser:todopassword@todo-app-postgres-service:5432/todoapp