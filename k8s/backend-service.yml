apiVersion: v1
kind: Service
metadata:
  name: todo-app-backend-service  
  namespace: todo-app
  labels:
    app: todo-app
    component: backend
spec:
  selector:
    app: todo-app
    component: backend
  ports:
    - name: http
      port: 8080 # ClusterIP Service Port
      targetPort: 8000 # Container Port
